page_title: Meram Ne Demek?
paragraphs:
  - 'Meram, sözlükte "niyet, istek, içten gelen dilek" anlamına gelir. Biz de bu
    kelimeyi bir marka değil, bir duruş olarak seçtik: söyleyecek sözü olan ama
    bunu dile getirmeden anlatan  bir giyim anlayışı.'
  - Her Meram parçası, gereksiz detaylardan arındırılmış sade bir kesimle
    başlar. Toprak ve zeytin tonları; mevsimden bağımsız, dolabında yerini hemen
    bulan bir palet sunar. Baskılar göz alıcı değil, sakin; dikişler ise hem
    gösterişli hem de sağlam.
  - Küçük ölçekli ve sınırlı sayıda üretim yapıyoruz. Bu, her serinin özel
    kalmasını sağlıyor. Aceleye getirilmiş bir koleksiyon değil, üzerine
    düşünülmüş birkaç parça.
  - Meram Store, Denizli'de küçük bir fikirle, 2026 yılında kuruldu. Amacımız
    konuşmadan kendini anlatmak isteyenlerle buluşmak, giydiğinde "bu tam benim
    meramım" dedirten  doğru parçalar üretmek.
signature: MERAM STORE — 2026'DA BİR MERAM İLE KURULDU
